syntax = "proto3";

package proto;

option go_package = "vendor-service/proto/generate;proto";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

service HistoryService {

  rpc Add(CreateHistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/history/create"
      body: "*"
    };
  }

  rpc Update(UpdateHistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/history/update"
      body: "*"
    };
  }

  rpc Delete(DeleteHistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/history/delete/{id}"
    };
  }

  rpc GetByOrderID(GetHistoryByOrderIDRequest) returns (HistoryResponse) {
    option (google.api.http) = {
      get: "/api/history/order/{orderId}"
    };
  }

  rpc GetByPaymentID(GetHistoryByPaymentIDRequest) returns (HistoryResponse) {
    option (google.api.http) = {
      get: "/api/history/payment/{paymentId}"
    };
  }

  rpc GetByProductID(GetHistoryByProductIDRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/api/history/product/{productId}"
    };
  }

  rpc GetByVendorID(GetHistoryByVendorIDRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/api/history/vendor/{vendorId}"
    };
  }

  rpc GetByStatus(GetHistoryByStatusRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/api/history/status"
    };
  }

  rpc GetByIsActive(GetHistoryByActiveRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/api/history/actives"
    };
  }
}

message History {
  int32 id = 1;
  string orderId = 2;
  string paymentId = 3;
  int32 quantity = 4;
  int32 productId = 5;
  int32 vendorId = 6;
  Status status = 7;
  bool active = 8;
  string createdAt = 9;
  string updatedAt = 10;
}

enum Status {
  CREATED = 0;
  RUNNING = 1;
  PAID = 2;
  READY = 3;
  SENT = 4;
  DELIVERED = 5;
}

message CreateHistoryRequest {
  string orderId = 1;
  string paymentId = 2;
  int32 quantity = 3;
  int32 productId = 4;
  int32 vendorId = 5;
}

message UpdateHistoryRequest {
  History history = 1;
}

message DeleteHistoryRequest {
  int32 id = 1;
}

message GetHistoryByOrderIDRequest {
  string orderId = 1;
}

message GetHistoryByPaymentIDRequest {
  string paymentId = 1;
}

message GetHistoryByProductIDRequest {
  int32 productId = 1;
}

message GetHistoryByVendorIDRequest {
  int32 vendorId = 1;
}

message GetHistoryByStatusRequest {
  Status status = 1;
}

message GetHistoryByActiveRequest {
}

message HistoryResponse {
  History history = 1;
}

message ListHistoryResponse {
  repeated History histories = 1;
}