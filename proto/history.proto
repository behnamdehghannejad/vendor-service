syntax = "proto3";

package proto;

option go_package = "vendor-service/proto/generate;proto";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

service HistoryService {

  rpc Add(CreateHistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/history/create"
      body: "*"
    };
  }

  rpc Update(UpdateHistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/history/update"
      body: "*"
    };
  }

  rpc Delete(DeleteHistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/history/delete"
    };
  }

  rpc FindByOrderID(GetHistoryByOrderIDRequest) returns (HistoryResponse) {
    option (google.api.http) = {
      get: "/history/order/get/{id}"
    };
  }

  rpc FindByPaymentID(GetHistoryByPaymentIDRequest) returns (HistoryResponse) {
    option (google.api.http) = {
      get: "/history/payment/get/{paymentId}"
    };
  }

  rpc FindByProductID(GetHistoryByProductIDRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/history/product/get/{productId}"
    };
  }

  rpc FindByVendorID(GetHistoryByVendorIDRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/history/vendor/get/{vendorId}"
    };
  }

  rpc FindByStatus(GetHistoryByStatusRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/history/status/get/{status}"
    };
  }

  rpc FindByIsActive(GetHistoryByActiveRequest) returns (ListHistoryResponse) {
    option (google.api.http) = {
      get: "/history/active/get/{active}"
    };
  }
}

message History {
  int32 id = 1;
  string orderId = 2;
  string paymentId = 3;
  int32 quantity = 4;
  int32 productId = 5;
  int32 vendorId = 6;
  Status status = 7;
  bool active = 8;
  string createdAt = 9;
  string updatedAt = 10;
}

enum Status {
  CREATED = 0;
  RUNNING = 1;
  PAID = 2;
  READY = 3;
  SENT = 4;
  DELIVERED = 5;
}

message CreateHistoryRequest {
  string orderId = 1;
  string paymentId = 2;
  int32 quantity = 3;
  int32 productId = 4;
  int32 vendorId = 5;
}

message UpdateHistoryRequest {
  History history = 1;
}

message DeleteHistoryRequest {
  int32 id = 1;
}

message GetHistoryByOrderIDRequest {
  string id = 1;
}

message GetHistoryByPaymentIDRequest {
  string paymentId = 1;
}

message GetHistoryByProductIDRequest {
  int32 productId = 1;
}

message GetHistoryByVendorIDRequest {
  int32 vendorId = 1;
}

message GetHistoryByStatusRequest {
  Status status = 1;
}

message GetHistoryByActiveRequest {
  bool active = 1;
}

message HistoryResponse {
  History history = 1;
}

message ListHistoryResponse {
  repeated History histories = 1;
}