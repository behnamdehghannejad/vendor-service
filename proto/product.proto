syntax = "proto3";

package proto;

option go_package = "vendor-service/proto/generate;proto";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

service ProductService {

  rpc Add(CreateProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/product/create"
      body: "*"
    };
  }

  rpc Update(UpdateProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/product/update"
      body: "*"
    };
  }

  rpc Delete(DeleteProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/product/delete/{id}"
    };
  }

  rpc FindById(GetProductRequest) returns (ProductResponse) {
    option (google.api.http) = {
      get: "/api/product/{id}"
    };
  }
}

message Product {
  int32 id = 1;
  string name = 2;
  string description = 3;
  bool active = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
}

message UpdateProductRequest {
  Product product = 1;
}

message DeleteProductRequest {
  int32 id = 1;
}

message GetProductRequest {
  int32 id = 1;
}

message ProductResponse {
  Product product = 1;
}